# Cloudflare Pages Wrangler Configuration for KVideo
# This file ensures the necessary compatibility flags are applied.
# Place this file in the root of your repository.

name = "kvideo"
pages_build_output_dir = ".vercel/output/static"

# Use a fixed compatibility date for stability, instead of a dynamic date.
# Update this date only when you need newer runtime features.
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# ----- Build Configuration -----
# These settings are for reference; actual build commands are set in the Cloudflare Dashboard.
# [build]
# command = "npm run build"
# output_dir = ".vercel/output/static"

# ----- Environment Variables -----
# It's recommended to set secrets like ACCESS_PASSWORD in the Cloudflare Dashboard
# for better security, rather than hardcoding them here.
# [vars]
# ACCESS_PASSWORD = "your-secret-password"
